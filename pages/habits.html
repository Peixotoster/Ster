<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hábitos - STER</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .habits-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .habits-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .habits-header h1 { font-size: 28px; margin: 0; }
        .habit-card { background: #fff; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; display: flex; align-items: center; gap: 16px; transition: all 0.3s; }
        .habit-card:hover { border-color: #6c63ff; }
        .habit-card.completed { border-left: 4px solid #4caf50; background: #f8fff8; }
        .habit-check { flex-shrink: 0; }
        .habit-check input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #6c63ff; }
        .habit-info { flex: 1; }
        .habit-name { font-weight: 600; font-size: 16px; }
        .habit-name .completed-text { color: #4caf50; margin-left: 8px; font-size: 14px; }
        .habit-desc { font-size: 14px; color: #888; margin-top: 2px; }
        .habit-stats { display: flex; gap: 16px; font-size: 13px; color: #666; flex-wrap: wrap; margin-top: 4px; }
        .habit-stats .streak { color: #f5c842; font-weight: 600; }
        .habit-stats .best { color: #6c63ff; }
        .habit-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .habit-actions button { background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.3s; font-size: 16px; }
        .habit-actions .delete-btn:hover { background: #fee; color: #c00; }
        .habit-actions .edit-btn:hover { background: #f0f0f0; }
        .add-habit-btn { width: 100%; padding: 14px; border: 2px dashed #ddd; border-radius: 12px; background: transparent; color: #666; font-weight: 500; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
        .add-habit-btn:hover { border-color: #6c63ff; color: #6c63ff; background: rgba(108, 99, 255, 0.04); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: #fff; border-radius: 16px; padding: 32px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 20px; margin: 0; }
        .modal-close { font-size: 28px; cursor: pointer; color: #999; background: none; border: none; transition: color 0.3s; }
        .modal-close:hover { color: #333; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #6c63ff; }
        .btn-save { width: 100%; padding: 12px; background: #6c63ff; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-save:hover { background: #5a52d5; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3); }
        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #f8f9fa; padding: 12px 16px; border-radius: 8px; text-align: center; }
        .stat-box .number { font-size: 24px; font-weight: 700; color: #6c63ff; }
        .stat-box .label { font-size: 12px; color: #888; margin-top: 2px; }
        .loading-spinner { text-align: center; padding: 40px; color: #888; }
        .loading-spinner .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #f0f0f0; border-top: 4px solid #6c63ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .habit-card { flex-wrap: wrap; } .habit-actions { width: 100%; justify-content: flex-end; } }
    </style>
</head>
<body class="dashboard-page">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand"><span class="logo">⭐ STER</span></div>
        <nav class="sidebar-nav">
            <a href="/dashboard.html"><span>📊</span> Dashboard</a>
            <a href="/tasks.html"><span>📋</span> Tarefas</a>
            <a href="/habits.html" class="active"><span>🔥</span> Hábitos</a>
            <a href="/finances.html"><span>💰</span> Finanças</a>
            <a href="/workout.html"><span>💪</span> Treino</a>
            <a href="/settings.html"><span>⚙️</span> Configurações</a>
        </nav>
        <div class="sidebar-footer">
            <button onclick="STER.Settings.logout()" class="btn btn-outline btn-small">🚪 Sair</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <div class="habits-container">
            <div class="habits-header">
                <div>
                    <h1>🔥 Hábitos</h1>
                    <p style="color:#888;font-size:14px;">Construa uma rotina melhor dia após dia</p>
                </div>
                <button onclick="STER.Habits.showAddModal()" class="btn btn-primary">➕ Novo Hábito</button>
            </div>

            <!-- Stats -->
            <div class="stats-summary">
                <div class="stat-box"><div class="number" id="totalHabits">0</div><div class="label">Total Hábitos</div></div>
                <div class="stat-box"><div class="number" id="completedToday">0</div><div class="label">Feitos Hoje</div></div>
                <div class="stat-box"><div class="number" id="bestStreak">0</div><div class="label">Maior Sequência</div></div>
            </div>

            <!-- Loading -->
            <div id="loadingIndicator" class="loading-spinner"><div class="spinner"></div><p style="margin-top:12px;">Carregando hábitos...</p></div>

            <!-- Habit List -->
            <div id="habitList" style="display:none;"></div>

            <!-- Add Button -->
            <button class="add-habit-btn" onclick="STER.Habits.showAddModal()" id="addHabitBtn" style="display:none;">➕ Adicionar Hábito</button>
        </div>
    </main>

    <!-- MODAL -->
    <div class="modal" id="habitModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Novo Hábito</h2>
                <button class="modal-close" onclick="STER.Habits.closeModal()">&times;</button>
            </div>
            <form id="habitForm">
                <input type="hidden" id="editHabitId">
                <div class="form-group">
                    <label>Nome do Hábito *</label>
                    <input type="text" id="habitName" placeholder="Ex: Beber 2L de água" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="habitDesc" placeholder="Ex: Manter hidratação durante o dia">
                </div>
                <div class="form-group">
                    <label>Frequência</label>
                    <select id="habitFrequency">
                        <option value="daily">Diário</option>
                        <option value="weekly">Semanal</option>
                        <option value="monthly">Mensal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Meta Diária</label>
                    <input type="number" id="habitTarget" value="1" min="1">
                </div>
                <button type="submit" class="btn-save">Salvar Hábito</button>
            </form>
        </div>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof STER !== 'undefined' && STER.Habits) {
                STER.Habits.init();
            } else {
                console.error('STER.Habits não encontrado');
            }
        });
    </script>
</body>
</html>
