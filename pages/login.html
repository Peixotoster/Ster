<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - STER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <span class="logo">⭐ STER</span>
                <h2>Bem-vindo de volta</h2>
                <p>Entre para continuar</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="toggle-password" onclick="STER.togglePassword('password')">👁️</span>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="remember"> Lembrar-me
                    </label>
                    <a href="/forgot-password.html" class="link">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Entrar</button>

                <div id="loginError" class="error-message" style="display:none;"></div>
            </form>

            <div class="auth-footer">
                <p>Não tem conta? <a href="/register.html" class="link">Criar conta</a></p>
            </div>
        </div>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => STER.initLogin());
    </script>
</body>
</html>
