<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - STER</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <span class="logo">⭐ STER</span>
                <h2>Crie sua conta</h2>
                <p>Comece agora mesmo</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Nome completo</label>
                    <input type="text" id="name" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                    <span class="password-strength" id="passwordStrength"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar senha</label>
                    <input type="password" id="confirmPassword" placeholder="Digite novamente" required>
                </div>

                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" id="terms" required> Concordo com os <a href="/terms.html" class="link">Termos</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Criar conta</button>

                <div id="registerError" class="error-message" style="display:none;"></div>
            </form>

            <div class="auth-footer">
                <p>Já tem conta? <a href="/login.html" class="link">Fazer login</a></p>
            </div>
        </div>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => LifeOS.initRegister());
    </script>
</body>
</html>
